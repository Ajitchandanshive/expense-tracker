<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daily expense tracker - track and manage your monthly expenses">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234CAF50' width='192' height='192'/><text x='96' y='140' font-size='140' font-weight='bold' text-anchor='middle' fill='white'>💰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234CAF50' width='192' height='192'/><text x='96' y='140' font-size='140' font-weight='bold' text-anchor='middle' fill='white'>💰</text></svg>">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💰 Expense Tracker</h1>
            <div class="month-selector">
                <button id="prevMonth" class="nav-btn">&lt;</button>
                <span id="currentMonth" class="month-label"></span>
                <button id="nextMonth" class="nav-btn">&gt;</button>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="card">
                <h3>Monthly Total</h3>
                <p class="amount" id="monthlyTotal">₹0.00</p>
            </div>
            <div class="card">
                <h3>This Month</h3>
                <p class="amount" id="thisMonthTotal">₹0.00</p>
            </div>
            <div class="card">
                <h3>Average Daily</h3>
                <p class="amount" id="averageDaily">₹0.00</p>
            </div>
        </div>

        <!-- Add Expense Form -->
        <div class="add-expense-section">
            <h2>Add Expense</h2>
            <form id="expenseForm">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Coffee, Groceries" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Health">Health</option>
                            <option value="Education">Education</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="btn-primary">Add Expense</button>
            </form>
        </div>

        <!-- Category Breakdown -->
        <div class="category-section">
            <h2>Spending by Category</h2>
            <div class="category-breakdown" id="categoryBreakdown">
                <!-- Categories will be populated here -->
            </div>
        </div>

        <!-- Expenses List -->
        <div class="expenses-section">
            <h2>Recent Expenses</h2>
            <div class="controls">
                <select id="filterCategory">
                    <option value="">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Health">Health</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
                <button class="btn-secondary" id="exportBtn">📥 Export to CSV</button>
            </div>
            <ul class="expenses-list" id="expensesList">
                <!-- Expenses will be populated here -->
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(() => {
                console.log('Service Worker registration not available');
            });
        }
    </script>
</body>
</html>
